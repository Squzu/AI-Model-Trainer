<svg viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>

    <linearGradient id="titleFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="45%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>

    <linearGradient id="chipFace" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>

    <linearGradient id="chipSide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0369a1"/>
      <stop offset="100%" stop-color="#075985"/>
    </linearGradient>

    <linearGradient id="chipTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="320" fill="url(#bg)"/>

  <circle cx="120" cy="60" r="140" fill="#3b82f6" opacity="0.06"/>
  <circle cx="1100" cy="260" r="180" fill="#38bdf8" opacity="0.05"/>

  <g filter="url(#softShadow)">
    <g transform="translate(150,225)">
      <polygon points="0,-70 60,-100 60,10 0,40" fill="url(#chipSide)"/>
      <polygon points="0,-70 60,-100 130,-70 70,-40" fill="url(#chipTop)"/>
      <polygon points="0,-70 70,-40 70,50 0,20" fill="url(#chipFace)"/>
      <polygon points="70,-40 130,-70 130,20 70,50" fill="url(#chipSide)" opacity="0.85"/>

      <g stroke="#e0f2fe" stroke-width="2.5" opacity="0.9">
        <line x1="20" y1="-45" x2="20" y2="8"/>
        <line x1="35" y1="-52" x2="35" y2="1"/>
        <line x1="50" y1="-59" x2="50" y2="-6"/>
      </g>
    </g>
  </g>

  <g filter="url(#softShadow)" font-family="Arial, Helvetica, sans-serif">
    <text x="330" y="150" font-size="86" font-weight="900" fill="#0b1120" opacity="0.55">AI MODEL TRAINER</text>
    <text x="326" y="146" font-size="86" font-weight="900" fill="#0b1120" opacity="0.55">AI MODEL TRAINER</text>
    <text x="322" y="142" font-size="86" font-weight="900" fill="url(#titleFace)">AI MODEL TRAINER</text>
  </g>

  <text x="330" y="195" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="500" fill="#93c5fd">
    LoRA / QLoRA Fine-Tuning &#8226; Merge &#8226; Export &#8226; Deploy
  </text>

  <text x="330" y="230" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#64748b">
    Built for consumer GPUs starting at 4GB VRAM
  </text>
</svg>
